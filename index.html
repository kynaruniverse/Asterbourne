<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterbourne Chinese Takeaway</title>
    <style>
        /* CSS Variables for Branding */
        :root {
            --maroon: #800000;
            --yellow: #FFFF00;
            --white: #ffffff;
            --text-dark: #222;
            --light-bg: #fdfdfd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--text-dark);
            scroll-behavior: smooth;
        }

        /* Header & Contact */
        header {
            background-color: var(--maroon);
            color: var(--white);
            text-align: center;
            padding: 25px 15px;
            border-bottom: 5px solid var(--yellow);
        }

        h1 { margin: 0; font-size: 2.5rem; text-transform: uppercase; }
        .tagline { margin: 5px 0; font-style: italic; color: var(--yellow); }

        .contact-bar {
            background: #fff;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-call {
            background-color: var(--maroon);
            color: var(--yellow);
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.2rem;
            border: 2px solid var(--yellow);
        }

        /* Navigation & Search */
        .sticky-tools {
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        #searchInput {
            width: 90%;
            display: block;
            margin: 0 auto 10px;
            padding: 12px;
            border: 2px solid var(--maroon);
            border-radius: 8px;
            font-size: 1rem;
        }

        .category-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 10px;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .cat-btn {
            background: var(--maroon);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Menu Grid */
        .container { max-width: 800px; margin: auto; padding: 15px; }

        .menu-section { margin-bottom: 30px; scroll-margin-top: 130px; }
        .menu-section h2 { 
            background: var(--maroon); 
            color: var(--yellow); 
            padding: 10px; 
            border-radius: 4px;
            font-size: 1.2rem;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .item-info { flex: 1; padding-right: 10px; }
        .item-no { font-weight: bold; color: var(--maroon); margin-right: 5px; }
        .item-name { font-weight: 500; }
        .item-desc { display: block; font-size: 0.85rem; color: #666; margin-top: 2px; }
        .item-price { font-weight: bold; white-space: nowrap; }

        /* Set Dinners Feature Boxes */
        .set-dinner-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .set-card {
            background: #fff;
            border-left: 10px solid var(--maroon);
            border-right: 1px solid #ddd;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        .set-card h3 { color: var(--maroon); margin: 0 0 10px 0; border-bottom: 1px solid var(--yellow); padding-bottom: 5px; }
        .set-price { float: right; color: var(--text-dark); }

        /* Map & Footer */
        .map-section { margin-top: 40px; text-align: center; }
        footer {
            background: var(--maroon);
            color: white;
            text-align: center;
            padding: 30px 15px;
            margin-top: 50px;
        }
        footer a { color: var(--yellow); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>ASTERBOURNE</h1>
    <p class="tagline">Authentic Chinese Takeaway</p>
</header>

<div class="contact-bar">
    <a href="tel:01255429600" class="btn-call">📞 ORDER NOW: 01255 429 600</a>
    <p style="margin-top:10px; font-size:0.9rem;">59 Coppins Road, Clacton-on-Sea, CO15 3HT</p>
</div>

<div class="sticky-tools">
    <input type="text" id="searchInput" placeholder="Search menu (e.g. 'Beef', 'Duck', '134')..." onkeyup="filterMenu()">
    <div class="category-nav" id="catNav">
        </div>
</div>

<div class="container">
    <div id="mainMenu">
        </div>

    <div class="menu-section" id="setDinners">
        <h2 style="background: var(--yellow); color: var(--maroon);">SPECIAL SET DINNERS</h2>
        <div class="set-dinner-grid" id="setDinnerContent">
            </div>
    </div>

    <div class="map-section">
        <h3>FIND US</h3>
        <a href="https://www.google.com/maps/dir/?api=1&destination=59+Coppins+Road+Clacton-on-Sea+CO15+3HT" target="_blank">
            <img src="https://maps.googleapis.com/maps/api/staticmap?center=59+Coppins+Road,Clacton-on-Sea,CO15+3HT&zoom=15&size=400x200&sensor=false&markers=color:red%7C59+Coppins+Road,Clacton-on-Sea,CO15+3HT&key=YOUR_API_KEY_OPTIONAL" alt="Map Location" style="width:100%; border-radius:8px; border:2px solid var(--maroon);">
            <p>Tap to open in Google Maps</p>
        </a>
    </div>
</div>

<footer>
    <p>&copy; 2026 Asterbourne Chinese Takeaway</p>
    [span_2](start_span)<p>All items subject to availability[span_2](end_span)</p>
</footer>

<script>
    // Load and Build the Menu
    async function initMenu() {
        try {
            const response = await fetch('menu.json');
            const data = await response.json();
            
            const mainMenu = document.getElementById('mainMenu');
            const catNav = document.getElementById('catNav');
            const setDinnerContent = document.getElementById('setDinnerContent');

            // 1. Build Regular Categories
            data.categories.forEach(cat => {
                // Add to Nav
                const navLink = document.createElement('a');
                navLink.href = `#${cat.id}`;
                navLink.className = 'cat-btn';
                navLink.innerText = cat.name.split(' ')[0]; // Use first word for mobile buttons
                catNav.appendChild(navLink);

                // Add Menu Section
                let section = document.createElement('section');
                section.className = 'menu-section';
                section.id = cat.id;
                
                let html = `<h2>${cat.name}</h2>`;
                cat.items.forEach(item => {
                    html += `
                        <div class="item-row">
                            <div class="item-info">
                                <span class="item-no">${item.no}.</span>
                                <span class="item-name">${item.name}</span>
                                ${item.desc ? `<span class="item-desc">${item.desc}</span>` : ''}
                            </div>
                            <div class="item-price">${item.price}</div>
                        </div>
                    `;
                });
                section.innerHTML = html;
                mainMenu.appendChild(section);
            });

            // 2. Build Set Dinners
            data.setDinners.forEach(set => {
                const card = `
                    <div class="set-card">
                        <h3>${set.name} <span class="set-price">${set.price}</span></h3>
                        <p style="font-size:0.9rem; line-height:1.4;">${set.details}</p>
                    </div>
                `;
                setDinnerContent.innerHTML += card;
            });

        } catch (error) {
            console.error("Error loading menu:", error);
        }
    }

    // Real-time Filter Search
    function filterMenu() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('.item-row');
        const sections = document.querySelectorAll('.menu-section');

        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(input) ? 'flex' : 'none';
        });

        // Hide headers if no items visible in that section
        sections.forEach(section => {
            const visibleRows = section.querySelectorAll('.item-row[style="display: flex;"]');
            if (section.id !== 'setDinners') {
                section.style.display = (visibleRows.length > 0) ? 'block' : 'none';
            }
        });
    }

    window.onload = initMenu;
</script>

</body>
</html>
